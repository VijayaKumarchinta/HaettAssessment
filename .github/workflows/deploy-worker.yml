# =============================================================================
# HaettAssessment API Worker — Deploy to Cloudflare Workers
# =============================================================================
# Runs on every push to main. Deploys the Worker and applies D1 migrations.
# Requires CLOUDFLARE_API_TOKEN and D1 secrets set as GitHub Actions secrets.
# =============================================================================

name: Deploy API Worker

on:
  push:
    branches: [main]
    paths:
      - "worker/**"
      - ".github/workflows/deploy-worker.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: worker

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Apply D1 migrations
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "3.90.0"
          workingDirectory: worker
          command: d1 migrations apply haett-db --remote

      - name: Deploy Worker
        run: npx --package=wrangler wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set JWT_SECRET
        run: printf '%s' "$HAETT_JWT_SECRET" | npx --package=wrangler wrangler secret put JWT_SECRET
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          HAETT_JWT_SECRET: ${{ secrets.HAETT_JWT_SECRET }}

      - name: Set SALT
        run: printf '%s' "$HAETT_SALT" | npx --package=wrangler wrangler secret put SALT
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          HAETT_SALT: ${{ secrets.HAETT_SALT }}
